<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바티인베스트 채팅방 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">B</div>
      <div>
        <div class="login-logo-text">바티인베스트</div>
        <div class="login-logo-sub">채팅방 관리 대시보드</div>
      </div>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" id="login-email" type="email" placeholder="team@example.com" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" id="login-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="login-err" class="hidden" style="font-size:12px;color:var(--red);margin-bottom:.75rem;padding:8px 10px;background:rgba(245,54,92,.1);border-radius:var(--radius-sm)"></div>
      <button class="btn btn-primary" style="width:100%" id="login-btn" onclick="doLogin()">로그인</button>
      <div style="margin-top:1rem;text-align:center">
        <span style="font-size:12px;color:var(--text3)">계정이 없으신가요? </span>
        <button style="font-size:12px;color:var(--tg);background:none;border:none;cursor:pointer" onclick="showSignup()">회원가입</button>
      </div>
    </div>
    <div id="signup-form" class="hidden">
      <div class="form-group">
        <label class="form-label">이름</label>
        <input class="form-input" id="signup-name" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" id="signup-email" type="email" placeholder="team@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" id="signup-pw" type="password" placeholder="8자 이상">
        <div class="form-hint">첫 번째 가입자는 자동으로 admin이 됩니다.</div>
      </div>
      <div id="signup-err" class="hidden" style="font-size:12px;color:var(--red);margin-bottom:.75rem;padding:8px 10px;background:rgba(245,54,92,.1);border-radius:var(--radius-sm)"></div>
      <button class="btn btn-primary" style="width:100%" id="signup-btn" onclick="doSignup()">가입하기</button>
      <div style="margin-top:1rem;text-align:center">
        <button style="font-size:12px;color:var(--tg);background:none;border:none;cursor:pointer" onclick="showLogin()">← 로그인으로 돌아가기</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard" class="hidden">
<div class="app">
  <div class="overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">B</div>
      <div><div class="logo-text">바티인베스트</div><div class="logo-sub">채팅방 관리 대시보드</div></div>
    </div>
    <div class="nav">
      <div class="nav-sec">메뉴</div>
      <div class="nav-item active" data-page="overview" onclick="go('overview')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
        전체 현황
      </div>
      <div class="nav-item" data-page="rooms" onclick="go('rooms')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M13 3H3a1 1 0 00-1 1v7a1 1 0 001 1h2l3 2 3-2h2a1 1 0 001-1V4a1 1 0 00-1-1z" stroke="currentColor" stroke-width="1.3"/></svg>
        채팅방 관리 <span class="nav-badge" id="badge">—</span>
      </div>
      <div class="nav-item" data-page="notice" onclick="go('notice')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 5l6-3 6 3v7H2V5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><rect x="6" y="9" width="4" height="3" rx=".5" stroke="currentColor" stroke-width="1.3"/></svg>
        전체 공지
      </div>
      <div class="nav-item" data-page="logs" onclick="go('logs')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 13L6 8l3 3 5-7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        동기화 로그
      </div>
      <div class="nav-sec">자동화</div>
      <div class="nav-item" data-page="financials" onclick="go('financials')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M1 6h14" stroke="currentColor" stroke-width="1.3"/><path d="M5 9h2M9 9h2M5 12h2M9 12h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        재무 조회
      </div>
      <div class="nav-item" data-page="stocks" onclick="go('stocks')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 12l3-4 3 2 3-5 3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/></svg>
        종목 관리
      </div>
      <div class="nav-item" data-page="bot" onclick="go('bot')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M6 4V3a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.3"/><circle cx="6" cy="8.5" r="1" fill="currentColor"/><circle cx="10" cy="8.5" r="1" fill="currentColor"/></svg>
        봇 모니터링
      </div>
      <div class="nav-item" data-page="botconfig" onclick="go('botconfig')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 2l1.5 3h3l-2.5 2 1 3L8 8.5 5 10l1-3L3.5 5h3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        봇 설정
      </div>
      <div class="nav-sec">관리</div>
      <div class="nav-item" data-page="team" id="nav-team" onclick="go('team')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M1 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="12" cy="6" r="1.8" stroke="currentColor" stroke-width="1.3"/><path d="M14.5 13c0-1.93-1.12-3.6-2.75-4.38" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        팀원 관리
      </div>
      <div class="nav-item" data-page="settings" id="nav-settings" onclick="go('settings')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3 3l1 1M12 12l1 1M3 13l1-1M12 4l1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        설정
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div style="overflow:hidden">
          <div class="user-name" id="user-name">—</div>
          <div class="user-email" id="user-email">—</div>
        </div>
      </div>
      <button class="btn btn-sm" style="width:100%;font-size:11px" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="menu-btn" onclick="toggleSidebar()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="topbar-title" id="page-title">전체 현황</div>
      </div>
      <div class="topbar-actions">
        <button class="btn" id="sync-btn" onclick="syncAll()">
          <svg style="width:13px;height:13px;vertical-align:middle;margin-right:4px" viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 112.5 5M2.5 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="btn-label">멤버 수 동기화</span>
        </button>
        <button class="btn" id="btn-notice" onclick="openModal('m-notice')"><span class="btn-label">공지 발송</span></button>
        <button class="btn btn-primary" id="btn-add" onclick="openModal('m-add')">+ <span class="btn-label">방 추가</span></button>
      </div>
    </div>
    <div class="content" id="content">
      <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--text3)">
        <span class="loading"></span>불러오는 중...
      </div>
    </div>
  </div>
</div>
</div>

<div class="toast-container" id="toasts"></div>

<!-- Add Room Modal -->
<div class="modal-overlay" id="m-add">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">새 채팅방 추가</span><button class="modal-close" onclick="closeModal('m-add')">×</button></div>
    <div class="form-group"><label class="form-label">채팅방 이름 *</label><input class="form-input" id="a-name" placeholder="예: 카카오뱅크"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">산업 *</label>
        <select class="form-select" id="a-cat"><option>바이오</option><option>뷰티</option><option>로봇</option><option>2차전지</option><option>신재생</option><option>소비재</option><option>테크</option><option>반도체</option><option>엔터</option><option>조선</option><option>우주</option></select>
      </div>
      <div class="form-group"><label class="form-label">세부 분야</label><input class="form-input" id="a-sub" placeholder="신약개발"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">종목코드</label><input class="form-input" id="a-code" placeholder="196170.KQ"></div>
      <div class="form-group"><label class="form-label">최대 정원</label><input class="form-input" type="number" id="a-max" value="1000"></div>
    </div>
    <div class="form-group"><label class="form-label">Chat ID *</label><input class="form-input" id="a-chatid" placeholder="-100xxxxxxxxxx 또는 @channel"></div>
    <div class="form-group"><label class="form-label">초대 링크</label><input class="form-input" id="a-link" placeholder="https://t.me/..."></div>
    <div class="form-group"><label class="form-label">키워드</label><input class="form-input" id="a-kw" placeholder="키워드1, 키워드2"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('m-add')">취소</button>
      <button class="btn btn-primary" onclick="addRoom()">추가</button>
    </div>
  </div>
</div>

<!-- Notice Modal -->
<div class="modal-overlay" id="m-notice">
  <div class="modal" style="width:520px">
    <div class="modal-header"><span class="modal-title">전체 공지 발송</span><button class="modal-close" onclick="closeModal('m-notice')">×</button></div>
    <div class="form-group"><label class="form-label">대상</label>
      <select class="form-select" id="n-target">
        <option value="all">전체</option><option value="open">입장 가능 방</option>
        <option value="바이오">바이오</option><option value="뷰티">뷰티</option><option value="로봇">로봇</option>
        <option value="2차전지">2차전지</option><option value="테크">테크</option><option value="반도체">반도체</option><option value="신재생">신재생</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">내용 *</label><textarea class="form-input" id="n-content" oninput="prev(this.value,'n-prev')"></textarea></div>
    <div class="form-group"><label class="form-label">미리보기</label><div id="n-prev" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;min-height:36px;color:var(--text2)"></div></div>
    <div id="n-prog" class="hidden" style="font-size:12px;padding:8px;background:var(--bg3);border-radius:var(--radius-sm);color:var(--text2);margin-bottom:.5rem"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('m-notice')">취소</button>
      <button class="btn btn-primary" id="n-btn" onclick="sendNoticeModal()">발송</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="m-detail">
  <div class="modal" style="width:520px">
    <div class="modal-header"><span class="modal-title" id="d-title">채팅방 상세</span><button class="modal-close" onclick="closeModal('m-detail')">×</button></div>
    <div class="tabs">
      <button class="tab active" onclick="dtab('info',this)">정보</button>
      <button class="tab" onclick="dtab('edit',this)">수정</button>
      <button class="tab" onclick="dtab('msg',this)">개별 공지</button>
      <button class="tab" onclick="dtab('log',this)">동기화 이력</button>
    </div>
    <div id="d-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('m-detail')">닫기</button>
      <button class="btn btn-primary" id="d-tg">텔레그램 열기</button>
    </div>
  </div>
</div>


<!-- 종목 추가 Modal -->
<div class="modal-overlay" id="m-stock-add">
  <div class="modal" style="width:520px">
    <div class="modal-header"><span class="modal-title">종목 추가</span><button class="modal-close" onclick="closeModal('m-stock-add')">×</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">종목명 *</label><input class="form-input" id="sa-name" placeholder="예: 삼성전자"></div>
      <div class="form-group"><label class="form-label">종목코드 *</label><input class="form-input" id="sa-code" placeholder="005930.KS"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">산업 *</label>
        <select class="form-select" id="sa-industry">
      <option>바이오</option>
      <option>반도체</option>
      <option>2차전지</option>
      <option>로봇</option>
      <option>뷰티</option>
      <option>테크</option>
      <option>조선</option>
      <option>신재생</option>
      <option>엔터</option>
      <option>소비재</option>
      <option>우주</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">세부분야</label><input class="form-input" id="sa-sub" placeholder="HBM장비"></div>
    </div>
    <div class="form-group"><label class="form-label">텔레그램 채팅방 ID</label><input class="form-input" id="sa-chatid" placeholder="-1001234567890"><div class="form-hint">개별 채팅방이 있는 경우에만 입력</div></div>
    <div class="form-group"><label class="form-label">추가 검색 키워드</label><input class="form-input" id="sa-kw-add" placeholder="스노우피크,스노우피크어패럴"><div class="form-hint">뉴스 검색 시 종목명 외 추가할 키워드 (쉼표 구분)</div></div>
    <div class="form-group"><label class="form-label">관련 키워드</label><input class="form-input" id="sa-kw-rel" placeholder=""><div class="form-hint">관련 업종·테마 키워드 (쉼표 구분)</div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('m-stock-add')">취소</button>
      <button class="btn btn-primary" onclick="addStock()">추가</button>
    </div>
  </div>
</div>

<!-- 종목 수정 Modal -->
<div class="modal-overlay" id="m-stock-edit">
  <div class="modal" style="width:520px">
    <div class="modal-header"><span class="modal-title">종목 수정</span><button class="modal-close" onclick="closeModal('m-stock-edit')">×</button></div>
    <input type="hidden" id="se-id">
    <div class="form-row">
      <div class="form-group"><label class="form-label">종목명 *</label><input class="form-input" id="se-name"></div>
      <div class="form-group"><label class="form-label">종목코드</label><input class="form-input" id="se-code" placeholder="005930.KS"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">산업</label><input class="form-input" id="se-industry" placeholder="반도체"></div>
      <div class="form-group"><label class="form-label">세부분야</label><input class="form-input" id="se-sub" placeholder="HBM장비"></div>
    </div>
    <div class="form-group"><label class="form-label">텔레그램 채팅방 ID</label><input class="form-input" id="se-chatid" placeholder="-1001234567890"></div>
    <div class="form-group"><label class="form-label">추가 검색 키워드</label><input class="form-input" id="se-kw-add" placeholder="스노우피크,스노우피크어패럴"><div class="form-hint">쉼표로 구분</div></div>
    <div class="form-group"><label class="form-label">관련 키워드</label><input class="form-input" id="se-kw-rel" placeholder=""></div>
    <div class="form-group" style="display:flex;align-items:center;gap:10px">
      <input type="checkbox" id="se-active" style="width:16px;height:16px">
      <label class="form-label" style="margin:0;cursor:pointer" for="se-active">봇 알림 활성화</label>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('m-stock-edit')">취소</button>
      <button class="btn btn-primary" onclick="saveStockEdit()">저장</button>
    </div>
  </div>
</div>

<!-- 설정 & 인증 -->
<script src="js/config.js?v=1776401272" defer></script>
<script src="js/auth.js?v=1776401272" defer></script>
<!-- 핵심 기능 -->
<script src="js/telegram.js?v=1776401272" defer></script>
<script src="js/rooms.js?v=1776401272" defer></script>
<script src="js/nav.js?v=1776401272" defer></script>
<!-- 페이지 렌더링 -->
<script src="js/pages.js?v=1776401272" defer></script>
<script src="js/financials.js?v=1776401272" defer></script>
<script src="js/stocks.js?v=1776401272" defer></script>
<script src="js/bots.js?v=1776401272" defer></script>
<!-- 유틸리티 -->
<script src="js/detail.js?v=1776401272" defer></script>

  document.addEventListener('DOMContentLoaded', function() {
    bootAuth();
  });
</script>
</body>
</html>
